name: Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  helm-unit-test:
    name: helm unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup helmfile
        uses: mamezou-tech/setup-helmfile@v2.2.0
      - name: Helm unit test
        run: helmfile unittest