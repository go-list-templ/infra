repositories:
  - name: prometheus-community
    url: https://prometheus-community.github.io/helm-charts
  - name: grafana
    url: https://grafana.github.io/helm-charts
  - name: grafana-community
    url: https://grafana-community.github.io/helm-charts

releases:
  - name: prometheus-stack
    namespace: telemetry
    chart: prometheus-community/kube-prometheus-stack
    version: "83.3.0"
    values:
      - ./telemetry/prometheus-stack/values.yaml

  - name: loki
    namespace: telemetry
    chart: grafana-community/loki
    version: "11.4.0"
    needs: [ telemetry/prometheus-stack ]
    values:
      - ./telemetry/loki/values.yaml

  - name: tempo
    namespace: telemetry
    chart: grafana-community/tempo
    version: "2.0.0"
    values:
      - ./telemetry/tempo/values.yaml

  - name: pyroscope
    namespace: telemetry
    chart: grafana/pyroscope
    version: "1.20.3"
    values:
      - ./telemetry/pyroscope/values.yaml

  - name: alloy
    namespace: telemetry
    chart: grafana/alloy
    version: "1.7.0"
    needs: [ telemetry/loki, telemetry/tempo, telemetry/pyroscope ]
    values:
      - ./telemetry/alloy/values.yaml