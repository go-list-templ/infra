apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  labels:
    app: users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
        - name: app
          image: tilt.dev/users
          ports:
            - containerPort: 9001
            - containerPort: 9002
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_DATABASE
              value: dev
            - name: REDIS_URL
              value: redis://redis:6379
            - name: OTEL_GRPC_ENDPOINT
              value: otel-collector:4317
---
apiVersion: v1
kind: Service
metadata:
  name: users
  labels:
    app: users
spec:
  selector:
    app: users
  ports:
    - name: grpc
      protocol: TCP
      port: 9001
      targetPort: 9001
    - name: diagnostic
      protocol: TCP
      port: 9002
      targetPort: 9002
  type: ClusterIP