alertmanager:
  enabled: false

nodeExporter:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    enableFeatures:
      - exemplar-storage
      - native-histograms

grafana:
  adminPassword: "admin"
  service:
    type: NodePort

  plugins:
    - grafana-pyroscope-app
    - grafana-exploretraces-app

  additionalDataSources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://prometheus-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
      editable: true
      jsonData:
        timeInterval: 60s
        exemplarTraceIdDestinations:
          - name: trace_id
            datasourceUid: "tempo"
            urlDisplayLabel: "Trace: $${__value.raw}"

    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.monitoring.svc.cluster.local:3200
      access: proxy
      editable: true
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        search:
          hide: false
        lokiSearch:
          datasourceUid: "loki"
        tracesToLogsV2:
          datasourceUid: "loki"
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          filterByTraceID: true
          filterBySpanID: true
          customQuery: true
          query: '{$${__tags}} |= "$${__span.traceId}"'
        tracesToMetrics:
          datasourceUid: prometheus
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          tags:
            - key: service.name
              value: job
        tracesToProfiles:
          customQuery: false
          datasourceUid: "pyroscope"
          profileTypeId: "process_cpu:cpu:nanoseconds:cpu:nanoseconds"
          tags:
            - key: "service.name"
              value: "service_name"

    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.monitoring.svc.cluster.local:80
      access: proxy
      editable: true
      jsonData:
        derivedFields:
          - name: "trace_id"
            matcherType: "label"
            matcherRegex: "traceid"
            url: "$${__value.raw}"
            datasourceUid: "tempo"
            urlDisplayLabel: "Trace: $${__value.raw}"

    - name: Pyroscope
      type: grafana-pyroscope-datasource
      uid: pyroscope
      url: http://pyroscope.monitoring.svc.cluster.local:4040
      access: proxy
      editable: true
