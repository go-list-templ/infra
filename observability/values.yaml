alloy:
  configMap:
    content: |
      // OTLP receiver configuration
      otelcol.receiver.otlp "otlp_receiver" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }
      
      // OTLP exporter to Tempo
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo:4317"
          tls {
            insecure = true
          }
        }
      }
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

kube-prometheus-stack:
  grafana:
    adminPassword: "admin"
    service:
      type: NodePort
    plugins:
      - grafana-exploretraces-app

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Tempo
            type: tempo
            access: proxy
            url: http://tempo:3100
            uid: tempo
            jsonData:
              httpMethod: GET
              serviceMap:
                datasourceUid: prometheus
              tracesToMetrics:
                datasourceUid: prometheus
  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      enableFeatures:
        - exemplar-storage
        - native-histograms

  alertmanager:
    enabled: false

  nodeExporter:
    enabled: false

  prometheus-node-exporter:
    enabled: false

tempo:
  tag: main-814c1c6

  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://monitoring-kube-prometheus-prometheus:9090/api/v1/write"

  overrides:
    defaults:
      metrics_generator:
        processors: [service-graphs, span-metrics, local-blocks]

  persistence:
    enabled: true