alloy:
  alloy:
    configMap:
      content: |
        otelcol.receiver.otlp "otlp_receiver" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }
          output {
            traces = [otelcol.exporter.otlp.tempo.input]
          }
        }
        
        otelcol.exporter.otlp "tempo" {
          client {
            endpoint = "observability-tempo.monitoring.svc.cluster.local:4317"
            tls {
              insecure = true
            }
          }
        }
    extraPorts:
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP

kube-prometheus-stack:
  alertmanager:
    enabled: false

  nodeExporter:
    enabled: true

  prometheus-node-exporter:
    enabled: true

  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      enableFeatures:
        - exemplar-storage
        - native-histograms

  grafana:
    adminPassword: "admin"
    service:
      type: NodePort

    plugins:
      - grafana-exploretraces-app

    additionalDataSources:
      - name: Tempo
        type: tempo
        url: http://observability-tempo.monitoring.svc.cluster.local:3100
        access: proxy
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy

tempo:
  tempo:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: "0.0.0.0:4317" }

    tag: main-814c1c6

    metricsGenerator:
      enabled: true
      remoteWriteUrl: "http://observability-kube-prometh-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"

    overrides:
      defaults:
        metrics_generator:
          processors: [ service-graphs, span-metrics, local-blocks ]

  persistence:
    enabled: true