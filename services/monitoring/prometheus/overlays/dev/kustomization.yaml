apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring
namePrefix: dev-

resources:
  - ../../base

helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 83.3.0
    releaseName: prometheus
    valuesFile: values.yaml