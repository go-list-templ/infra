apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - ../../base

helmCharts:
  - name: kube-prometheus-stack
    releaseName: prometheus
    namespace: monitoring
    repo: https://prometheus-community.github.io/helm-charts
    version: 83.3.0
    valuesFile: values.yaml