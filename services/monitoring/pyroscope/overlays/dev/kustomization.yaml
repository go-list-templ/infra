apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring
namePrefix: dev-

resources:
  - ../../base

helmCharts:
  - name: pyroscope
    repo: https://grafana.github.io/helm-charts
    version: 1.20.3
    releaseName: pyroscope
    valuesFile: values.yaml
    includeCRDs: true