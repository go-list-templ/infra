apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring
namePrefix: dev-

resources:
  - ../../base

helmCharts:
  - name: tempo
    repo: https://grafana-community.github.io/helm-charts
    version: 2.0.0
    releaseName: tempo
    valuesFile: values.yaml
    includeCRDs: true