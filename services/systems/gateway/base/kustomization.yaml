apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gateway

resources:
  - https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.5.0/standard-install.yaml
  - namespace.yaml
  - proxy-config.yaml
  - gateway.yaml

helmCharts:
  - name: eg
    repo: oci://docker.io/envoyproxy/gateway-helm
    version: v1.7.2
    releaseName: gateway
    namespace: gateway