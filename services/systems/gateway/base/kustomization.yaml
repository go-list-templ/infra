apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: envoy-gateway-system

resources:
  - proxy-config.yaml
  - gateway.yaml

helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy
    version: v1.7.2
    releaseName: eg
    namespace: envoy-gateway-system
    includeCRDs: false