loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: 'filesystem'
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        index:
          prefix: loki_index_
          period: 24h
        object_store: filesystem
        schema: v13
  compactor:
    retention_enabled: true
    working_directory: /var/loki/compactor
    retention_delete_delay: 2h
    compaction_interval: 1h
    delete_request_store: filesystem
  limits_config:
    retention_period: 720h
  podSecurityContext:
    fsGroupChangePolicy: "OnRootMismatch"

chunksCache:
  enabled: false
resultsCache:
  enabled: false

test:
  enabled: false

deploymentMode: SingleBinary

singleBinary:
  persistence:
    storageClass: synology-nfs-csi
  replicas: 1

write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0