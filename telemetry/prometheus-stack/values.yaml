alertmanager:
  enabled: false

nodeExporter:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    enableFeatures:
      - exemplar-storage
      - native-histograms

grafana:
  adminPassword: "admin"
  service:
    type: NodePort

  plugins:
    - grafana-exploretraces-app

  additionalDataSources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://prometheus-stack-kube-prom-prometheus.telemetry.svc.cluster.local:9090
      editable: true
      jsonData:
        timeInterval: 60s
        exemplarTraceIdDestinations:
          - name: trace_id
            datasourceUid: tempo
            urlDisplayLabel: "Trace: $${__value.raw}"

    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.telemetry.svc.cluster.local:3200
      access: proxy
      editable: true
      jsonData:
        # HTTP method for API calls
        httpMethod: GET
        # Enable service graph visualization
        serviceMap:
          datasourceUid: prometheus
        # Enable node graph for trace visualization
        nodeGraph:
          enabled: true
        # TraceQL search configuration
        search:
          hide: false
        # Link traces to logs in Loki
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          filterByTraceID: true
          filterBySpanID: true
          customQuery: true
          query: '{$${__tags}} |= "$${__span.traceId}"'
        # Link traces to metrics
        tracesToMetrics:
          datasourceUid: prometheus
          spanStartTimeShift: "-1h"
          spanEndTimeShift: "1h"
          tags:
            - key: service.name
              value: job

    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.telemetry.svc.cluster.local:80
      access: proxy
      editable: true
      jsonData:
        derivedFields:
          - name: "trace_id"
            matcherType: "label"
            matcherRegex: "trace_id"
            url: "$${__value.raw}"
            datasourceUid: "tempo"
            urlDisplayLabel: "Trace: $${__value.raw}"
