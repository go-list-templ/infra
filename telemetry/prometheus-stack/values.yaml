alertmanager:
  enabled: false

nodeExporter:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    enableFeatures:
      - exemplar-storage
      - native-histograms

grafana:
  adminPassword: "admin"
  service:
    type: NodePort

  plugins:
    - grafana-exploretraces-app

  additionalDataSources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://prometheus-stack-kube-prom-prometheus.telemetry.svc.cluster.local:9090
      editable: true
      jsonData:
        timeInterval: 60s
        exemplarTraceIdDestinations:
          - name: trace_id
            datasourceUid: tempo
            urlDisplayLabel: "Trace: $${__value.raw}"

    - name: Tempo
      type: tempo
      uid: tempo
      url: http://tempo.telemetry.svc.cluster.local:3200
      access: proxy
      editable: true
      jsonData:
        tracesToLogsV2:
          customQuery: true
          datasourceUid: "loki"
          query: '{$${__tags}} | trace_id = "$${__trace.traceId}"'
          tags:
            - key: "service.name"
              value: "service_name"

        serviceMap:
          datasourceUid: "prometheus"
        search:
          hide: false
        nodeGraph:
          enabled: true
        lokiSearch:
          datasourceUid: "loki"

    - name: Loki
      type: loki
      uid: loki
      url: http://loki-gateway.telemetry.svc.cluster.local:80
      access: proxy
      editable: true
      jsonData:
        derivedFields:
          - name: "trace_id"
            matcherType: "label"
            matcherRegex: "trace_id"
            url: "$${__value.raw}"
            datasourceUid: "tempo"
            urlDisplayLabel: "Trace: $${__value.raw}"
