alertmanager:
  enabled: false

nodeExporter:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    enableFeatures:
      - exemplar-storage
      - native-histograms

grafana:
  adminPassword: "admin"
  service:
    type: NodePort

  plugins:
    - grafana-exploretraces-app

  additionalDataSources:
    - name: Tempo
      type: tempo
      url: http://tempo.telemetry.svc.cluster.local:3100
      access: proxy
    - name: Loki
      type: loki
      url: http://loki-gateway.telemetry.svc.cluster.local:80
      access: proxy
      # Even with auth_enabled: false, Loki requires an org ID header
      # This is a known quirk - the value can be anything since auth is disabled
      jsonData:
        httpHeaderName1: "X-Scope-OrgID"
      secureJsonData:
        httpHeaderValue1: "fake"
